<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cranamp</title>
  <style>
    :root {
      color-scheme: dark;
      background: #050608;
      color: #e9edf0;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #050608;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    main {
      width: min(100%, 960px);
      height: min(720px, calc(100vh - 36px));
      min-height: 520px;
      border: 1px solid #2b3038;
      background: #090b10;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050608;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="cranamp-canvas" width="900" height="700"></canvas>
  </main>

  <script type="module">
    import init, { run_app } from "./pkg/cranamp.js";

    await init();
    await run_app();
  </script>
</body>
</html>
