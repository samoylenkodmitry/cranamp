name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cranamp-linux-x86_64
            binary: target/release/cranamp
          - os: macos-latest
            artifact: cranamp-macos
            binary: target/release/cranamp
          - os: windows-latest
            artifact: cranamp-windows-x86_64.exe
            binary: target/release/cranamp.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux audio/dialog dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - name: Build
        run: cargo build --release
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.binary }}" "release/${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build widget
        run: ./build-web.sh
      - name: Package
        run: tar -czf cranamp-web.tar.gz -C dist .
      - uses: actions/upload-artifact@v7
        with:
          name: cranamp-web
          path: cranamp-web.tar.gz

  publish:
    name: Publish GitHub Release
    needs: [desktop, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          files: artifacts/**/*
